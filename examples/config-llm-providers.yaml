#═══════════════════════════════════════════════════════════════════
# TESTING YOUR CONFIGURATION
#═══════════════════════════════════════════════════════════════════
#
# 1. Basic search (no LLM needed):
#    rag-mini search "test query"
#
# 2. LLM synthesis:
#    rag-mini search "test query" --synthesize
#
# 3. Desktop GUI:
#    rag-mini gui
#
# TROUBLESHOOTING:
#
# "Connection refused"  → Start LM Studio / check API key
# "Model not found"     → Load a model in LM Studio / check model name
# Slow responses        → Try a smaller model
# Poor quality          → Try a larger model or adjust temperature
#═══════════════════════════════════════════════════════════════════
