# LLM Provider Alternatives
# Copy the provider section you need into your main config.yaml
#
# All providers use the same OpenAI-compatible API format.
# FSS-Mini-RAG auto-detects models from the endpoint.

#═══════════════════════════════════════════════════════════════════
# QUICK PROVIDER SELECTION GUIDE:
#
# LOCAL (Best Privacy, No Internet):
#   LM Studio: User-friendly GUI, works with many models (RECOMMENDED)
#   vLLM: High performance, multi-GPU support
#
# CLOUD (Powerful Models, Requires API Keys):
#   OpenRouter: Access to many models with one API, free tier available
#   OpenAI: High quality, reliable
#   Anthropic: Excellent for code analysis
#═══════════════════════════════════════════════════════════════════

# Standard settings (copy these to any config)
chunking:
  max_size: 2000
  min_size: 150
  strategy: semantic

streaming:
  enabled: true
  threshold_bytes: 1048576

files:
  min_file_size: 50
  exclude_patterns:
    - "node_modules/**"
    - ".git/**"
    - "__pycache__/**"
    - "*.pyc"
    - ".venv/**"
    - "build/**"
    - "dist/**"
  include_patterns:
    - "**/*"

embedding:
  provider: openai
  base_url: http://localhost:1234/v1     # LM Studio default
  model: auto
  profile: precision
  batch_size: 32

search:
  default_top_k: 10
  enable_bm25: true
  similarity_threshold: 0.1
  expand_queries: false

#═══════════════════════════════════════════════════════════════════
# OPTION 1: LM STUDIO (LOCAL) — Default and Recommended
#═══════════════════════════════════════════════════════════════════
# Free, private, no API keys. Download from lmstudio.ai.
# Load an embedding model (MiniLM L6 v2) and a chat model.
# Start the local server (default port 1234).

llm:
  provider: openai
  api_base: http://localhost:1234/v1
  synthesis_model: auto                  # Uses whatever model is loaded
  expansion_model: auto
  enable_synthesis: false
  synthesis_temperature: 0.3
  enable_thinking: true
  max_expansion_terms: 8

# OPTION 2: OPENROUTER (CLOUD) — Many Models, One API
#
# llm:
#   provider: openai
#   api_base: https://openrouter.ai/api/v1
#   api_key: "your-openrouter-api-key"
#   synthesis_model: "meta-llama/llama-3.1-8b-instruct:free"
#   expansion_model: "meta-llama/llama-3.1-8b-instruct:free"
#   enable_synthesis: false
#   synthesis_temperature: 0.3
#   enable_thinking: true
#   max_expansion_terms: 8
#   timeout: 30

# OPTION 3: OPENAI (CLOUD) — Premium Quality
#
# llm:
#   provider: openai
#   api_key: "your-openai-api-key"
#   synthesis_model: "gpt-4o-mini"
#   expansion_model: "gpt-4o-mini"
#   enable_synthesis: false
#   synthesis_temperature: 0.3
#   enable_thinking: true
#   max_expansion_terms: 8
