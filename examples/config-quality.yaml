# Quality Config — Best Possible Results
# When you want the highest quality search and AI responses.
# Slower indexing and searching, but more comprehensive results.
#
# Perfect for: learning new codebases, research, complex analysis
#
# Requirements:
#   LM Studio with an embedding model (MiniLM L6 v2) and a chat model loaded
#   4GB+ RAM recommended
#
# To use: cp examples/config-quality.yaml .mini-rag/config.yaml

chunking:
  max_size: 3000          # Larger chunks = more context per result
  min_size: 200
  strategy: semantic

streaming:
  enabled: true
  threshold_bytes: 2097152  # 2MB

files:
  min_file_size: 20       # Include even small files
  exclude_patterns:
    - "node_modules/**"
    - ".git/**"
    - "__pycache__/**"
    - "*.pyc"
    - ".venv/**"
    - "build/**"
    - "dist/**"
  include_patterns:
    - "**/*"

embedding:
  provider: openai
  base_url: http://localhost:1234/v1
  model: auto
  profile: conceptual                    # Broader semantic matching
  batch_size: 16                         # Smaller batches for stability

search:
  default_top_k: 15       # More results
  enable_bm25: true
  similarity_threshold: 0.05  # Very permissive
  expand_queries: true    # LLM adds related terms (slower but broader)

llm:
  provider: openai
  api_base: http://localhost:1234/v1
  synthesis_model: auto
  expansion_model: auto
  enable_synthesis: true        # AI answers on every search
  synthesis_temperature: 0.4
  enable_thinking: true         # Show reasoning process
  max_expansion_terms: 10       # Comprehensive query expansion

# Trade-offs:
#   Slower indexing (larger chunks, more files)
#   Slower searching (query expansion, more results)
#   More storage (larger index)
#   Higher memory usage
#
# For even better results:
#   Use the 'conceptual' embedding profile (Nomic model)
#   Increase max_size to 4000 for maximum context
#   Lower similarity_threshold to 0.03 to see everything
