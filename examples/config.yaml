# FSS-Mini-RAG Configuration
#
# Quick start: keep defaults. They work with LM Studio out of the box.
# For large projects (>10k files): increase max_size to 3000
# For faster search: set expand_queries to false
# For better results: enable expand_queries (slower but broader)

#═══════════════════════════════════════════════════════════════════
# CHUNKING: How files are split into searchable pieces
#═══════════════════════════════════════════════════════════════════

chunking:
  max_size: 2000           # Maximum characters per chunk (~50 lines of code)
                           # Small projects: 1500 | Large projects: 3000
  min_size: 150            # Minimum characters per chunk (~4-5 lines)
  strategy: semantic       # 'semantic': Respects functions, classes (recommended)
                           # 'fixed': Simple splitting at size limits (faster)

#═══════════════════════════════════════════════════════════════════
# STREAMING: Large file handling
#═══════════════════════════════════════════════════════════════════

streaming:
  enabled: true
  threshold_bytes: 1048576  # Files larger than 1MB use streaming

#═══════════════════════════════════════════════════════════════════
# FILES: Include/exclude patterns
#═══════════════════════════════════════════════════════════════════

files:
  min_file_size: 50
  exclude_patterns:
    - "node_modules/**"
    - ".git/**"
    - "__pycache__/**"
    - "*.pyc"
    - ".venv/**"
    - "venv/**"
    - "build/**"
    - "dist/**"
  include_patterns:
    - "**/*"

#═══════════════════════════════════════════════════════════════════
# EMBEDDINGS: How text is converted to searchable vectors
#═══════════════════════════════════════════════════════════════════
# Works with any OpenAI-compatible endpoint: LM Studio, vLLM, OpenAI

embedding:
  provider: openai                           # 'openai' (OpenAI-compatible), 'ml' (local models)
  base_url: http://localhost:1234/v1         # LM Studio default
  model: auto                               # Auto-detects best embedding model
  profile: precision                         # 'precision' (MiniLM, fast, literal matching)
                                             # 'conceptual' (Nomic, semantic depth)
  batch_size: 32

#═══════════════════════════════════════════════════════════════════
# SEARCH: Finding and ranking results
#═══════════════════════════════════════════════════════════════════

search:
  default_top_k: 10         # Number of results to return
  enable_bm25: true         # Keyword matching alongside semantic search
  similarity_threshold: 0.1 # Minimum score to show (higher = fewer, more relevant)
  expand_queries: false      # LLM adds related terms before searching
                             # Better results but slower

#═══════════════════════════════════════════════════════════════════
# LLM: AI synthesis and query expansion
#═══════════════════════════════════════════════════════════════════
# Uses the same OpenAI-compatible endpoint as embeddings by default.
# Works with LM Studio, vLLM, OpenAI, Anthropic, OpenRouter.

llm:
  provider: openai
  api_base: http://localhost:1234/v1         # LM Studio default
  synthesis_model: auto                      # Auto-detects available model
  expansion_model: auto
  max_expansion_terms: 8
  enable_synthesis: false    # Set true for AI answers on every search
                             # Or use --synthesize flag per-query
  synthesis_temperature: 0.3 # Lower = factual, higher = creative
  enable_thinking: true      # Show LLM reasoning process

#═══════════════════════════════════════════════════════════════════
# TROUBLESHOOTING:
#
# Search returns nothing?    → Lower similarity_threshold to 0.05
# Search too slow?           → Set expand_queries: false
# Results not detailed?      → Increase max_size to 3000
# No semantic search?        → Start LM Studio with an embedding model loaded
# LLM synthesis not working? → Check LM Studio has a chat model loaded
# Out of memory?             → Decrease batch_size to 16
#═══════════════════════════════════════════════════════════════════
